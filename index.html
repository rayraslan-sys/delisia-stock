const STORAGE_KEY = “delisia_stock_v2”;

const STATUS_OPTIONS = [
{ value:“full”, label:“Full”, color:”#2d6a4f”, bg:”#d8f3dc” },
{ value:“ok”,   label:“OK”,   color:”#1d6a8a”, bg:”#caf0f8” },

“MATCHA”:“🍵”,“COOKIES & SWEETS”:“🍪”,“DRINKS”:“🥤”,“PACKAGING”:“📦”,“CLEANING PRODUCTS”:“🧹”
};

function load() {
try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : {}; }
catch { return {}; }
}
function save(d) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch {} }

function OrderReminder({ cat }) {
const relevant = ORDER_SCHEDULE.filter(s => s.categories.includes(cat));
if (!relevant.length) return null;
return (
<div style={{ padding: “0 16px 4px” }}>
{relevant.map((s,i) => (
<div key={i} style={{ background:s.bg, border:`1px solid ${s.color}`, borderRadius:10, padding:“10px 14px”, marginBottom:8, display:“flex”, alignItems:“center”, gap:10 }}>
<div style={{ fontSize:22 }}>{s.icon}</div>
<div>
<div style={{ fontWeight:“bold”, fontSize:13, color:s.color }}>⏰ {s.label} Deadline</div>
<div style={{ fontSize:12 }}><strong>{s.days}</strong> · Cut-off: <strong>{s.cutoff}</strong></div>
</div>
</div>
))}
</div>
);

function App() {
const [view, setView] = useState(“staff”);
const [activeCat, setActiveCat] = useState(“CHEESES”);
const [stock, setStock] = useState({});
const [par, setPar] = useState({});
const [name, setName] = useState(””);
const [savedAt, setSavedAt] = useState(null);
const [search, setSearch] = useState(””);
const [showOrders, setShowOrders] = useState(false);
const [isAdmin, setIsAdmin] = useState(false);
const [pin, setPin] = useState(””);
const [pinErr, setPinErr] = useState(false);
const [showPin, setShowPin] = useState(false);
const [editPar, setEditPar] = useState({});
const [mgrTab, setMgrTab] = useState(“overview”);
const [customItems, setCustomItems] = useState({});
const [newItemName, setNewItemName] = useState(””);
const [newItemCat, setNewItemCat] = useState(“CHEESES”);
const [newItemPar, setNewItemPar] = useState(””);
const [addItemMsg, setAddItemMsg] = useState(””);

useEffect(() => {
const d = load();
setStock(d.stock || {});
setPar(d.par || DEFAULT_PAR);
setName(d.name || “”);
setSavedAt(d.savedAt || null);
setCustomItems(d.customItems || {});
}, []);

const persist = (s, p, n, ci) => {
const payload = { stock:s, par:p, name:n !== undefined ? n : name, savedAt:new Date().toISOString(), customItems: ci !== undefined ? ci : customItems };
save(payload); setSavedAt(payload.savedAt);
};

const updateItem = (item, field, val) => {
const updated = { …stock, [item]: { …(stock[item]||{}), [field]:val, updatedAt:new Date().toISOString() } };
setStock(updated); persist(updated, par, name, customItems);
};

const savePar = () => {
const merged = { …par, …editPar };
setPar(merged); persist(stock, merged, name, customItems); setEditPar({});
};

const getStatus = i => stock[i] && stock[i].status ? stock[i].status : “”;
const getQty    = i => stock[i] && stock[i].qty !== undefined ? stock[i].qty : “”;
const getNotes  = i => stock[i] && stock[i].notes ? stock[i].notes : “”;
const getPar    = i => editPar[i] !== undefined ? editPar[i] : (par[i] !== undefined ? par[i] : “”);

const mergedCategories = Object.entries(CATEGORIES).reduce((acc, [cat, items]) => {
acc[cat] = […items, …(customItems[cat] || [])];
return acc;
}, {});

const cats = Object.keys(mergedCategories);
const allItems = Object.values(mergedCategories).flat();
const done = allItems.filter(i => getStatus(i)).length;
const progress = Math.round((done / allItems.length) * 100);
const today = new Date().toLocaleDateString(“en-AU”, { weekday:“long”, day:“numeric”, month:“long” });

const needsOrder = Object.entries(mergedCategories).flatMap(([cat, items]) =>
items.filter(i => getStatus(i) === “low” || getStatus(i) === “out”)
.map(i => ({ cat, item:i, status:getStatus(i), qty:getQty(i), notes:getNotes(i) }))
);

const filteredCats = search
? Object.entries(mergedCategories).reduce((acc,[cat,items]) => {
const f = items.filter(i => i.toLowerCase().includes(search.toLowerCase()));
if (f.length) acc[cat] = f; return acc;
}, {})
: mergedCategories;

const addItem = () => {
const trimmed = newItemName.trim();
if (!trimmed) { setAddItemMsg(“Please enter an item name.”); return; }
const existing = Object.values(mergedCategories).flat().map(i=>i.toLowerCase());
if (existing.includes(trimmed.toLowerCase())) { setAddItemMsg(“That item already exists.”); return; }
const updated = { …customItems, [newItemCat]: […(customItems[newItemCat]||[]), trimmed] };
setCustomItems(updated);
const newPar = { …par };
if (newItemPar) newPar[trimmed] = newItemPar;
setPar(newPar);
persist(stock, newPar, name, updated);
setNewItemName(””); setNewItemPar(””); setAddItemMsg(‘✓ “’ + trimmed + ’” added to ’ + newItemCat);
setTimeout(() => setAddItemMsg(””), 3000);
};

const tryAdmin = () => {
if (pin === ADMIN_PIN) { setIsAdmin(true); setShowPin(false); setPin(””); setPinErr(false); }
else { setPinErr(true); }
};

if (showPin) return (
<div style={{ minHeight:“100vh”, background:”#f5f0e8”, display:“flex”, alignItems:“center”, justifyContent:“center” }}>
<div style={{ background:”#fff”, borderRadius:16, padding:32, width:300, textAlign:“center”, border:“1px solid #e0d8c8” }}>
<div style={{ fontSize:36, marginBottom:8 }}>🔒</div>
<div style={{ fontWeight:“bold”, fontSize:18, marginBottom:4 }}>Admin Access</div>
<div style={{ fontSize:13, color:”#8a7a5a”, marginBottom:20 }}>Enter your PIN to continue</div>
<input type=“password” inputMode=“numeric” maxLength={6} value={pin}
onChange={e => { setPin(e.target.value); setPinErr(false); }}
onKeyDown={e => e.key===“Enter” && tryAdmin()}
placeholder=”• • • •”
style={{ width:“100%”, padding:12, borderRadius:8, border:“1.5px solid “ + (pinErr ? “#9b2226” : “#c9a84c”), fontSize:22, textAlign:“center”, letterSpacing:8, boxSizing:“border-box” }}
/>
{pinErr && <div style={{ color:”#9b2226”, fontSize:12, marginTop:6 }}>Incorrect PIN</div>}
<div style={{ display:“flex”, gap:10, marginTop:16 }}>
<button onClick={() => { setShowPin(false); setPin(””); setPinErr(false); }}
style={{ flex:1, padding:12, borderRadius:8, border:“1px solid #e0d8c8”, background:”#f5f0e8”, cursor:“pointer”, fontSize:14 }}>Cancel</button>
<button onClick={tryAdmin}
style={{ flex:1, padding:12, borderRadius:8, border:“none”, background:”#1a1410”, color:”#c9a84c”, fontWeight:“bold”, cursor:“pointer”, fontSize:14 }}>Enter</button>
</div>
</div>
</div>
);

return (
<div style={{ minHeight:“100vh”, background:”#f5f0e8”, color:”#1a1410”, maxWidth:600, margin:“0 auto” }}>

```

  {view==="manager" && (
    <div>
      <div style={{ display:"flex", background:"#fff", borderBottom:"1px solid #e0d8c8" }}>

          {cats.map(cat => (
            <div key={cat} style={{ background:"#fff", borderRadius:12, padding:14, marginBottom:10, border:"1px solid #e0d8c8" }}>

                    <span style={{ fontSize:11, color:"#8a7a5a" }}>Par:</span>
                    <input type="text" inputMode="decimal" value={getPar(item)}
                      onChange={e => setEditPar(prev => ({...prev, [item]:e.target.value}))}
                      placeholder="—"
                      style={{ width:56, padding:"6px 8px", borderRadius:6, border:"1.5px solid " + (editPar[item]!==undefined ? "#c9a84c" : "#e0d8c8"), fontSize:13, textAlign:"center", background:editPar[item]!==undefined ? "#fffbe6" : "#f9f6f0" }}
                    />
                  </div>
                </div>
              ))}
            </div>
          ))}
          {Object.keys(editPar).length > 0 && (
            <button onClick={savePar} style={{ width:"100%", padding:14, borderRadius:12, background:"#1a1410", color:"#c9a84c", border:"none", fontWeight:"bold", fontSize:15, cursor:"pointer", marginBottom:24 }}>
              💾 Save Par Changes
            </button>
          )}
        </div>
      )}

      {mgrTab==="schedule" && (
        <div style={{ padding:16 }}>
          <div style={{ fontSize:10, letterSpacing:2, color:"#8a7a5a", textTransform:"uppercase", marginBottom:12 }}>Ordering Schedule & Cut-off Times</div>
          {ORDER_SCHEDULE.map((s,i) => (
            <div key={i} style={{ background:s.bg, border:"1px solid " + s.color, borderRadius:12, padding:16, marginBottom:12 }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8 }}>
                <span style={{ fontSize:28 }}>{s.icon}</span>
                <div>
                  <div style={{ fontWeight:"bold", fontSize:15, color:s.color }}>{s.label}</div>
                  <div style={{ fontSize:12 }}>Applies to: {s.categories.join(", ")}</div>
                </div>
              </div>
              <div style={{ background:"rgba(255,255,255,0.6)", borderRadius:8, padding:"10px 12px" }}>
                <div style={{ fontSize:13 }}>📅 <strong>Order days:</strong> {s.days}</div>
                <div style={{ fontSize:13, marginTop:4 }}>⏰ <strong>Cut-off:</strong> {s.cutoff}</div>
              </div>
            </div>

          <div style={{ background:"#fff", borderRadius:12, padding:14, border:"1px solid #e0d8c8", fontSize:12, color:"#8a7a5a", lineHeight:1.7 }}>
            <strong style={{ color:"#1a1410" }}>Reminder for staff:</strong> These cut-offs are strict. If stock is running low, flag it before the cut-off — don't wait until it runs out.
          </div>
        </div>
      )}
    </div>
  )}

  {view==="staff" && (
    <div>
      {!name && (
        <div style={{ padding:"12px 16px", background:"#fffbe6", borderBottom:"1px solid #e0d8c8" }}>

                color: activeCat===cat ? "#f5f0e8" : "#1a1410",
                fontSize:12, cursor:"pointer", whiteSpace:"nowrap"
              }}>
                {CAT_ICONS[cat]} {cat} {allDone ? "✓" : hasLow ? "⚠️" : ""}
              </button>
            );
          })}
        </div>
      )}
      {!search && (
        <div style={{ paddingTop:12 }}>
          <OrderReminder cat={activeCat} />
        </div>
      )}
      <div style={{ padding:"8px 16px 32px" }}>
        {Object.entries(search ? filteredCats : {[activeCat]:mergedCategories[activeCat]}).map(([cat,items]) => (
          <div key={cat}>
            {search && (
              <div style={{ fontSize:10, letterSpacing:2, color:"#8a7a5a", textTransform:"uppercase", margin:"12px 0 8px" }}>
                {CAT_ICONS[cat]} {cat}
              </div>
            )}
            {items.map(item => {
              const status=getStatus(item), qty=getQty(item), notes=getNotes(item);
              const parVal = par[item] !== undefined ? par[item] : DEFAULT_PAR[item];

                    <div>
                      <div style={{ fontWeight:"bold", fontSize:15 }}>{item}</div>

                    />
                    <input type="text" placeholder="Notes..." value={notes}

          </div>

        <div style={{ padding:"12px 16px", textAlign:"center", fontSize:12, color:"#8a7a5a", borderTop:"1px solid #e0d8c8", background:"#fff" }}>

            onClick={() => { setName(""); persist(stock, par, "", customItems); }}>Change</span>
        </div>
      )}
    </div>
  )}
