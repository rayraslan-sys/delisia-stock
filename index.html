<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#1a1410"/>
<title>Délisia Stock Check</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:Georgia,serif;background:#f5f0e8;color:#1a1410;min-height:100vh;font-size:16px;}
button{font-family:Georgia,serif;cursor:pointer;}
input,select{font-family:Georgia,serif;}
.app{max-width:100%;margin:0 auto;}
#header{background:#1a1410;color:#f5f0e8;padding:14px 20px;position:sticky;top:0;z-index:100;border-bottom:3px solid #c9a84c;}
.header-row{display:flex;justify-content:space-between;align-items:center;}
.brand-sub{font-size:10px;letter-spacing:3px;color:#c9a84c;text-transform:uppercase;}
.brand-title{font-size:20px;font-weight:bold;letter-spacing:1px;}
.tab-btns{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end;}
.tab-btn{padding:8px 14px;border-radius:20px;border:1px solid #c9a84c;font-size:13px;letter-spacing:0.5px;white-space:nowrap;}
.tab-btn.active{background:#c9a84c;color:#1a1410;}
.tab-btn.inactive{background:transparent;color:#c9a84c;}
.progress-row{display:flex;justify-content:space-between;font-size:12px;color:#c9a84c;margin:10px 0 5px;}
.progress-track{height:4px;background:#3a3020;border-radius:2px;}
.progress-fill{height:4px;background:#c9a84c;border-radius:2px;transition:width 0.4s;}
.loc-bar{display:flex;background:#2a1f18;border-bottom:2px solid #c9a84c;}
.loc-btn{flex:1;padding:14px;border:none;background:transparent;color:#8a7a5a;font-size:15px;font-weight:bold;font-family:Georgia,serif;cursor:pointer;border-bottom:3px solid transparent;}
.loc-btn.active{color:#c9a84c;border-bottom:3px solid #c9a84c;background:#1a1410;}
.active-staff-bar{background:#2a1f18;padding:10px 20px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid #3a3020;min-height:42px;align-items:center;}
.active-staff-bar::-webkit-scrollbar{display:none;}
.staff-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;background:#3a3020;border-radius:20px;padding:6px 12px;}
.staff-chip-name{font-size:13px;color:#f5f0e8;font-weight:bold;}
.staff-chip-cat{font-size:11px;color:#c9a84c;}
.active-staff-empty{font-size:13px;color:#4a3a2a;font-style:italic;}
.checker-bar{background:#fffbe6;padding:12px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #e0d8c8;}
.checker-bar label{font-size:14px;color:#8a7a5a;white-space:nowrap;flex-shrink:0;}
.checker-select{flex:1;padding:10px 12px;border-radius:10px;border:1px solid #c9a84c;font-size:15px;background:#fff;font-family:Georgia,serif;cursor:pointer;}
.search-bar{padding:12px 20px;background:#fff;border-bottom:1px solid #e0d8c8;}
.cat-tabs{display:flex;overflow-x:auto;padding:12px 20px;gap:10px;background:#fff;border-bottom:1px solid #e0d8c8;-webkit-overflow-scrolling:touch;}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:13px;white-space:nowrap;border:1px solid #e0d8c8;position:relative;}
.cat-tab.active{border-color:#1a1410;background:#1a1410;color:#f5f0e8;}
.cat-tab.inactive{background:#f5f0e8;color:#1a1410;}
.cat-tab.warn-tab{border-color:#b5631a!important;}
.tab-badge{position:absolute;top:-6px;right:-6px;background:#9b2226;color:white;font-size:10px;font-weight:bold;border-radius:10px;padding:2px 6px;min-width:18px;text-align:center;line-height:16px;}
.items-list{padding:12px 20px 100px;}
.item-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;}
.item-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.item-name{font-weight:bold;font-size:17px;}
.item-par{font-size:13px;color:#8a7a5a;margin-top:3px;}
.status-badge{padding:4px 12px;border-radius:20px;font-size:13px;font-weight:bold;white-space:nowrap;flex-shrink:0;margin-left:8px;}
.status-btns{display:flex;gap:6px;margin-bottom:10px;}
.status-btn{flex:1;padding:12px 4px;border-radius:10px;font-size:12px;border:2px solid #e0d8c8;background:#f9f6f0;color:#8a7a5a;line-height:1.3;text-align:center;cursor:pointer;}
.status-btn b{display:block;font-size:14px;}
.status-btn small{display:block;font-size:10px;opacity:0.75;margin-top:2px;}
.item-inputs{display:flex;gap:8px;margin-bottom:6px;}
.item-input{flex:1;padding:10px 12px;border-radius:10px;border:1px solid #e0d8c8;font-size:14px;background:#f9f6f0;width:0;}
.checked-by{font-size:12px;color:#8a7a5a;font-style:italic;margin-top:6px;}
.search-input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid #ddd;font-size:15px;background:#f9f6f0;box-sizing:border-box;}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid #e0d8c8;}
.big-btn{width:100%;padding:16px;border-radius:12px;color:#fff;border:none;font-size:16px;font-weight:bold;margin-bottom:12px;font-family:Georgia,serif;cursor:pointer;}
.save-btn{width:100%;padding:16px;border-radius:12px;background:#1a1410;color:#c9a84c;border:none;font-weight:bold;font-size:16px;font-family:Georgia,serif;margin-bottom:14px;cursor:pointer;}
.warn-box{background:#fffbe6;border:1px solid #c9a84c;border-radius:12px;padding:14px;margin-bottom:14px;font-size:14px;line-height:1.6;}
.dashed{border:2px dashed #c9a84c!important;}
.field-label{font-size:13px;color:#8a7a5a;margin-bottom:5px;}
.field{margin-bottom:10px;}
.full-input{width:100%;padding:11px 12px;border-radius:10px;border:1px solid #e0d8c8;font-size:14px;background:#f9f6f0;box-sizing:border-box;font-family:Georgia,serif;}
.par-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f5f0e8;}
.par-input{width:64px;padding:8px 10px;border-radius:8px;font-size:14px;text-align:center;font-family:Georgia,serif;border:1.5px solid #e0d8c8;background:#f9f6f0;}
.cat-label{font-size:11px;letter-spacing:2px;color:#8a7a5a;text-transform:uppercase;margin:14px 0 8px;}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f0e8;align-items:center;}
.tag{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:bold;}
.custom-tag{font-size:11px;color:#c9a84c;margin-left:6px;font-style:italic;}
.mgr-tabs{display:flex;background:#fff;border-bottom:1px solid #e0d8c8;overflow-x:auto;}
.mgr-tabs::-webkit-scrollbar{display:none;}
.mgr-tab{flex-shrink:0;padding:14px 16px;border:none;background:transparent;font-size:13px;font-family:Georgia,serif;border-bottom:3px solid transparent;white-space:nowrap;cursor:pointer;color:#8a7a5a;}
.schedule-card{border-radius:14px;padding:18px;margin-bottom:14px;}
.schedule-inner{background:rgba(255,255,255,0.6);border-radius:10px;padding:12px 14px;}
.rem-card{border-radius:12px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.reminder{padding:0 20px 6px;}
.history-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid #e0d8c8;}
.history-date{font-weight:bold;font-size:14px;color:#1a1410;margin-bottom:4px;}
.history-meta{font-size:12px;color:#8a7a5a;margin-bottom:10px;}
.history-item-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid #f5f0e8;}
.history-item-row:last-child{border-bottom:none;}
.pin-overlay{position:fixed;inset:0;background:rgba(26,20,16,0.92);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
.pin-box{background:#fff;border-radius:20px;padding:36px;width:100%;max-width:360px;text-align:center;border:1px solid #e0d8c8;}
.modal-overlay{position:fixed;inset:0;background:rgba(26,20,16,0.85);display:flex;align-items:center;justify-content:center;z-index:800;padding:20px;}
.modal-box{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:380px;text-align:center;}
.footer{padding:12px 20px;text-align:center;font-size:12px;color:#8a7a5a;border-top:1px solid #e0d8c8;background:#fff;}
.hidden{display:none!important;}

/* iPad optimisations */
@media (min-width:768px){
  .app{max-width:720px;margin:0 auto;}
  .brand-title{font-size:22px;}
  .tab-btn{padding:9px 18px;font-size:14px;}
  .loc-btn{font-size:17px;padding:16px;}
  .cat-tab{font-size:14px;padding:10px 18px;}
  .item-name{font-size:18px;}
  .status-btn b{font-size:15px;}
  .status-btn small{font-size:11px;}
  .status-btn{padding:14px 4px;}
  .checker-select{font-size:16px;}
  .items-list{padding:16px 24px 100px;}
  .checker-bar{padding:14px 24px;}
  .search-bar{padding:14px 24px;}
  .cat-tabs{padding:14px 24px;}
  #header{padding:16px 24px;}
  .active-staff-bar{padding:12px 24px;}
  .card,.item-card,.history-card{padding:20px;}
  .big-btn,.save-btn{font-size:17px;padding:18px;}
  .mgr-tab{font-size:14px;padding:16px 18px;}
  .full-input{font-size:15px;padding:13px 14px;}
  .par-input{width:72px;font-size:15px;}
  .row{font-size:15px;}
}
</style>
</head>
<body>
<div class="app">

<div id="pinOverlay" class="pin-overlay hidden">
  <div class="pin-box">
    <div style="font-size:36px;margin-bottom:8px;">🔒</div>
    <div style="font-weight:bold;font-size:18px;margin-bottom:4px;" id="pinTitle">Manager Access</div>

    <div style="display:flex;gap:10px;margin-top:16px;">
      <button onclick="cancelPin()" style="flex:1;padding:12px;border-radius:8px;border:1px solid #e0d8c8;background:#f5f0e8;font-size:14px;">Cancel</button>
      <button onclick="submitPin()" style="flex:1;padding:12px;border-radius:8px;border:none;background:#1a1410;color:#c9a84c;font-weight:bold;font-size:14px;">Enter</button>
    </div>
  </div>
</div>

<div id="completionModal" class="modal-overlay hidden">
  <div class="modal-box">

    </div>
  </div>
</div>

<div id="header">
  <div class="header-row">
    <div>
      <div class="brand-sub">Délisia Panino &amp; Espresso</div>
      <div class="brand-title">Stock Check</div>
    </div>

      <button class="tab-btn inactive" id="btnBOH" onclick="switchView('boh')">👁️ BOH</button>
      <button class="tab-btn inactive" id="btnManager" onclick="switchView('manager')">🔒 Mgr</button>

  <div class="progress-row"><span id="todayDate"></span><span id="progressText">0/0 · 0%</span></div>

</div>

<div class="loc-bar">

  <button class="loc-btn inactive" id="locZT" onclick="selectLocation('Zetland')">🏙️ Zetland</button>
</div>

<div id="staffView">

</div>

<div id="bohView" class="hidden"><div style="padding:16px;" id="bohContent"></div></div>

  <div id="mgrPar" class="hidden" style="padding:16px;"></div>

  <div id="mgrHistory" class="hidden" style="padding:16px;"></div>
  <div id="mgrRoles" class="hidden" style="padding:16px;"></div>
</div>

</div>

function setSyncDot(s){const el=document.getElementById('syncDot');if(!el)return;if(s==='ok'){el.textContent='🟢';el.style.background='#2d6a4f';el.style.color='#d8f3dc';}else if(s==='err'){el.textContent='🔴';el.style.background='#9b2226';el.style.color='#ffd6d6';}else{el.textContent='⏳';el.style.background='#b5631a';el.style.color='#fde8c8';}}

async function sbFetch(path,opts={}){
  const res=await fetch(SB_URL+'/rest/v1/'+path,{...opts,headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})}});
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const t=await res.text();return t?JSON.parse(t):null;
}

async function loadFromSupabase(){
  setSyncDot('loading');
  try{
    const tbl='delisia_stock_'+locKey();
    const rows=await sbFetch(tbl+'?select=*&id=eq.1');
    if(rows&&rows.length){
      const r=rows[0];
      try{S.stock=JSON.parse(r.stock||'{}');}catch(e){S.stock={};}
      try{S.par=Object.assign({},DEFAULT_PAR,JSON.parse(r.par||'{}'));}catch(e){S.par=Object.assign({},DEFAULT_PAR);}
      try{S.customItems=JSON.parse(r.custom_items||'{}');}catch(e){S.customItems={};}
      try{S.customRoles=JSON.parse(r.custom_roles||'[]');}catch(e){S.customRoles=[];}
      try{S.customStaff=JSON.parse(r.custom_staff||'[]');}catch(e){S.customStaff=[];}
    }
    setSyncDot('ok');
    renderAll();
  }catch(e){
    setSyncDot('err');
    console.error('Load error:',e.message);
  }
}

async function saveToSupabase(){
  setSyncDot('loading');
  try{
    const tbl='delisia_stock_'+locKey();
    await sbFetch(tbl+'?id=eq.1',{
      method:'PATCH',
      body:JSON.stringify({
        stock:JSON.stringify(S.stock),
        par:JSON.stringify(S.par),
        custom_items:JSON.stringify(S.customItems),
        custom_roles:JSON.stringify(S.customRoles),
        custom_staff:JSON.stringify(S.customStaff),
        updated_at:new Date().toISOString()
      })
    });
    setSyncDot('ok');
  }catch(e){setSyncDot('err');console.error('Save error:',e.message);}
}

async function saveOrderToHistory(){
  const c=cats();
  const needs=Object.entries(c).flatMap(([k,items])=>items.filter(i=>gs(i)==='low'||gs(i)==='out').map(i=>({category:k,item:i,status:gs(i),qty:gq(i),notes:gn(i),backups:gb(i)})));
  const staffSummary=Object.entries(catCheckers).filter(([k,v])=>v).map(([k,v])=>v+' ('+k+')').join(', ')||'Unknown';
  try{
    await sbFetch('delisia_order_history_'+locKey(),{
      method:'POST',
      headers:{'Prefer':'return=minimal'},
      body:JSON.stringify({staff_name:staffSummary,location:loc,items:needs,saved_at:new Date().toISOString()})
    });
  }catch(e){console.error('History save error:',e.message);}
}

async function loadHistory(){
  try{
    const since=new Date(Date.now()-7*24*60*60*1000).toISOString();
    const rows=await sbFetch('delisia_order_history_'+locKey()+'?saved_at=gte.'+since+'&order=saved_at.desc&limit=50');
    return rows||[];
  }catch(e){console.error('History load error:',e.message);return[];}
}

function persist(){clearTimeout(syncTimer);syncTimer=setTimeout(()=>saveToSupabase(),800);}

function cats(){const r={};for(const k in BASE_CATS)r[k]=[...BASE_CATS[k],...(S.customItems[k]||[])];return r;}
function allItems(){return Object.values(cats()).flat();}
function gs(i){return(S.stock[i]&&S.stock[i].status)||'';}
function gq(i){return(S.stock[i]&&S.stock[i].qty)||'';}
function gn(i){return(S.stock[i]&&S.stock[i].notes)||'';}
function gb(i){return(S.stock[i]&&S.stock[i].backups)||'';}
function gcb(i){return(S.stock[i]&&S.stock[i].checkedBy)||'';}
function gp(i){return epChanges[i]!==undefined?epChanges[i]:(S.par[i]!==undefined?S.par[i]:'');}
function done(){return allItems().filter(i=>gs(i)).length;}
function pct(){return Math.round(done()/allItems().length*100)||0;}

function selectLocation(newLoc){
  loc=newLoc;catCheckers={};
  S={stock:{},par:Object.assign({},DEFAULT_PAR),customItems:{},customRoles:[],customStaff:[]};
  isManager=false;isBOH=false;
  document.getElementById('locFL').className='loc-btn '+(loc==='Forest Lodge'?'active':'inactive');
  document.getElementById('locZT').className='loc-btn '+(loc==='Zetland'?'active':'inactive');
  document.getElementById('btnManager').textContent='🔒 Mgr';
  document.getElementById('btnBOH').textContent='👁️ BOH';
  switchView('staff');loadFromSupabase();
}

function populateCatChecker(){
  const sel=document.getElementById('catChecker');if(!sel)return;
  const current=getCurrentChecker();
  sel.innerHTML='<option value="">— Select your name —</option>';
  getStaffList().forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;if(n===current)o.selected=true;sel.appendChild(o);});
}

function renderAll(){updateProg();populateCatChecker();renderActiveStaff();renderTabs();renderReminder();renderItems();renderFooter();}
function updateProg(){const d=done(),t=allItems().length,p=pct();document.getElementById('progressText').textContent=d+'/'+t+' · '+p+'%';document.getElementById('progressFill').style.width=p+'%';}

function renderActiveStaff(){
  const bar=document.getElementById('activeStaffBar');
  const active=Object.entries(catCheckers).filter(([k,v])=>v);
  if(!active.length){bar.innerHTML='<span class="active-staff-empty">Select a category then choose your name below</span>';return;}
  bar.innerHTML=active.map(([k,v])=>'<div class="staff-chip"><span class="staff-chip-name">'+v+'</span><span class="staff-chip-cat">'+k+'</span></div>').join('');
}

function renderFooter(){
  const f=document.getElementById('staffFooter');
  const active=Object.entries(catCheckers).filter(([k,v])=>v);
  if(active.length){f.classList.remove('hidden');f.textContent=active.map(([k,v])=>v+' → '+k).join(' · ');}
  else f.classList.add('hidden');
}

function renderTabs(){
  const el=document.getElementById('catTabs');el.innerHTML='';const c=cats();
  Object.entries(c).forEach(([k,items])=>{
    const checked=items.filter(i=>gs(i)).length;const unchecked=items.length-checked;
    const hasLow=items.some(i=>gs(i)==='low'||gs(i)==='out');const allDone=checked===items.length&&items.length>0;
    const checker=catCheckers[k];
    const b=document.createElement('button');
    b.className='cat-tab '+(k===cat?'active':'inactive')+(hasLow?' warn-tab':'');
    let label=(ICONS[k]||'')+' '+k+(allDone?' ✓':'');
    if(checker)label+=' <span style="font-size:9px;opacity:0.75;">('+checker+')</span>';
    b.innerHTML=label;
    if(unchecked>0&&k!==cat)b.innerHTML+='<span class="tab-badge">'+unchecked+'</span>';
    b.onclick=()=>attemptCatSwitch(k);el.appendChild(b);
  });
}

function attemptCatSwitch(newCat){
  if(newCat===cat)return;
  const items=cats()[cat]||[];const unchecked=items.filter(i=>!gs(i));
  if(unchecked.length>0&&getCurrentChecker()){
    pendingCatSwitch=newCat;
    document.getElementById('completionMsg').textContent=unchecked.length+' item'+(unchecked.length!==1?'s':'')+' in '+cat+' haven\'t been checked yet. Make sure nothing is missed.';
    document.getElementById('completionModal').classList.remove('hidden');
  }else doCatSwitch(newCat);
}
function closeCompletionModal(){document.getElementById('completionModal').classList.add('hidden');pendingCatSwitch=null;}
function confirmCatSwitch(){document.getElementById('completionModal').classList.add('hidden');if(pendingCatSwitch){doCatSwitch(pendingCatSwitch);pendingCatSwitch=null;}}
function doCatSwitch(newCat){cat=newCat;renderTabs();renderReminder();renderItems();populateCatChecker();}

function renderReminder(){
  const el=document.getElementById('reminderArea');el.innerHTML='';
  const rel=(ORDER_SCHEDULE[loc]||[]).filter(s=>s.cats.includes(cat));
  if(!rel.length){el.style.paddingTop='0';return;}
  el.style.paddingTop='8px';
  rel.forEach(s=>{el.innerHTML+=`<div class="reminder"><div class="rem-card" style="background:${s.bg};border:1px solid ${s.color};"><div style="font-size:22px;">${s.icon}</div><div><div style="font-weight:bold;font-size:13px;color:${s.color};">⏰ ${s.label}</div><div style="font-size:12px;"><strong>${s.days}</strong> · Cut-off: <strong>${s.cutoff}</strong></div></div></div></div>`;});
}

function renderItems(){
  const el=document.getElementById('itemsList');el.innerHTML='';const c=cats();let toRender={};
  if(search){Object.entries(c).forEach(([k,items])=>{const f=items.filter(i=>i.toLowerCase().includes(search.toLowerCase()));if(f.length)toRender[k]=f;});}
  else toRender={[cat]:c[cat]||[]};
  Object.entries(toRender).forEach(([k,items])=>{
    if(search){const l=document.createElement('div');l.className='cat-label';l.textContent=(ICONS[k]||'')+' '+k;el.appendChild(l);}
    items.forEach(item=>el.appendChild(buildCard(item,k)));
  });
}

function buildCard(item,k){
  const status=gs(item),qty=gq(item),notes=gn(item),backups=gb(item),checkedBy=gcb(item);
  const parV=S.par[item]!==undefined?S.par[item]:(DEFAULT_PAR[item]!==undefined?DEFAULT_PAR[item]:'');
  const si=STATUS.find(s=>s.v===status);const bc=status==='out'?'#ffd6d6':status==='low'?'#fde8c8':'#e0d8c8';
  const isC=S.customItems[k]&&S.customItems[k].includes(item);const isMeat=MEAT_CATS.includes(k);
  const d=document.createElement('div');d.className='item-card';d.style.border='1px solid '+bc;
  const ei=esc(item),ek=esc(k);
  const parHtml=parV!==''?`<div class="item-par">📊 Par: <strong>${parV}</strong></div>`:'';
  const statusBtns=STATUS.map(o=>`<button class="status-btn" style="border-color:${status===o.v?o.c:'#e0d8c8'};background:${status===o.v?o.bg:'#f9f6f0'};color:${status===o.v?o.c:'#8a7a5a'};font-weight:${status===o.v?'bold':'normal'};" onclick="setStatus('${ei}','${ek}','${o.v}')"><b>${o.l}</b><small>${o.sub}</small></button>`).join('');
  const backupsHtml=isMeat?`<input type="text" placeholder="🔪 Backups / cut & ready (e.g. 3 portions prepped)..." value="${backups.replace(/"/g,'&quot;')}" class="item-input" style="width:100%;border-color:#c9a84c;" onchange="setField('${ei}','backups',this.value)"/>`:'';    const checkedHtml=checkedBy?`<div class="checked-by">✓ Checked by ${checkedBy}</div>`:'';
  d.innerHTML=`<div class="item-header"><div><div class="item-name">${item}${isC?'<span class="custom-tag">custom</span>':''}</div>${parHtml}</div>${si?`<div class="status-badge" style="background:${si.bg};color:${si.c};">${si.l}</div>`:''}</div><div class="status-btns">${statusBtns}</div><div style="display:flex;flex-direction:column;gap:6px;margin-bottom:6px;"><input type="text" placeholder="Qty in stock (e.g. 2 full, 1 open)..." value="${qty.replace(/"/g,'&quot;')}" class="item-input" style="width:100%;" onchange="setField('${ei}','qty',this.value)"/><input type="text" placeholder="Notes (e.g. use first, check coolroom)..." value="${notes.replace(/"/g,'&quot;')}" class="item-input" style="width:100%;" onchange="setField('${ei}','notes',this.value)"/>${backupsHtml}</div>${checkedHtml}`;
  return d;
}

function setStatus(item,k,v){
  if(!S.stock[item])S.stock[item]={};S.stock[item].status=v;
  const checker=catCheckers[k]||catCheckers[cat]||'';if(checker)S.stock[item].checkedBy=checker;
  persist();updateProg();renderTabs();renderItems();renderActiveStaff();renderFooter();
}
function setField(item,field,v){if(!S.stock[item])S.stock[item]={};S.stock[item][field]=v;persist();}

function switchView(v){
  if(v==='manager'&&!isManager){pinTarget='manager';showPinOverlay('Manager Access','Full access to all management features.');return;}
  if(v==='boh'&&!isBOH&&!isManager){pinTarget='boh';showPinOverlay('BOH Supervisor Access','Overview access only.');return;}
  view=v;
  document.getElementById('staffView').classList.toggle('hidden',v!=='staff');
  document.getElementById('bohView').classList.toggle('hidden',v!=='boh');
  document.getElementById('managerView').classList.toggle('hidden',v!=='manager');
  document.getElementById('btnStaff').className='tab-btn '+(v==='staff'?'active':'inactive');
  document.getElementById('btnBOH').className='tab-btn '+(v==='boh'?'active':'inactive');
  document.getElementById('btnManager').className='tab-btn '+(v==='manager'?'active':'inactive');
  document.getElementById('btnManager').textContent=isManager?'⚙️ Mgr':'🔒 Mgr';
  document.getElementById('btnBOH').textContent=(isBOH||isManager)?'👁️ BOH':'🔒 BOH';
  if(v==='boh')renderBOH();if(v==='manager')setMgrTab(0);if(v==='staff')renderAll();
}
function showPinOverlay(title,sub){document.getElementById('pinTitle').textContent=title;document.getElementById('pinSubtitle').textContent=sub;document.getElementById('pinOverlay').classList.remove('hidden');document.getElementById('pinInput').value='';document.getElementById('pinErr').classList.add('hidden');}
function cancelPin(){document.getElementById('pinOverlay').classList.add('hidden');}
function submitPin(){
  const val=document.getElementById('pinInput').value;
  const custom=(S.customRoles||[]).find(r=>r.pin===val);
  if(custom&&custom.access==='boh'){isBOH=true;document.getElementById('pinOverlay').classList.add('hidden');switchView('boh');return;}
  if(val===PIN_BOH){isBOH=true;document.getElementById('pinOverlay').classList.add('hidden');switchView('boh');return;}
  if(val===PIN_MANAGER){isManager=true;isBOH=true;document.getElementById('pinOverlay').classList.add('hidden');switchView(pinTarget==='boh'?'boh':'manager');return;}
  document.getElementById('pinErr').classList.remove('hidden');
}

  el.innerHTML=h;
}
function toggleOrders(){showOrders=!showOrders;renderOverview();}
function downloadOrderCSV(){const c=cats();const rows=[['Date','Location','Item','Category','Status','Qty','Backups','Notes']];const d=new Date().toLocaleDateString('en-AU');Object.entries(c).forEach(([k,items])=>{items.filter(i=>gs(i)==='low'||gs(i)==='out').forEach(i=>{rows.push([d,loc,i,k,gs(i).toUpperCase(),gq(i),gb(i),gn(i)]);});});exportCSV(rows,'delisia-order-'+loc.replace(' ','-').toLowerCase()+'-'+new Date().toISOString().slice(0,10)+'.csv');}
function exportCSV(rows,filename){const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);}
function confirmReset(){if(confirm('Reset ALL stock for a new day?\n\nOrder list will be saved to history first.')){saveOrderToHistory().then(()=>{S.stock={};catCheckers={};persist();renderAll();renderOverview();});}}

function renderPar(){const c=cats(),el=document.getElementById('mgrPar');let h=`<div class="warn-box">🔐 <strong>Manager only.</strong> Set par levels and add custom items.</div><div class="card dashed" style="margin-bottom:14px;"><div style="font-weight:bold;font-size:13px;margin-bottom:12px;">➕ Add New Item</div><div class="field"><div class="field-label">Category</div><select id="niCat" class="full-input">${Object.keys(c).map(k=>`<option value="${k}">${ICONS[k]||''} ${k}</option>`).join('')}</select></div><div class="field"><div class="field-label">Item Name</div><input type="text" id="niName" placeholder="e.g. Truffle Honey" class="full-input" style="border:1px solid #e0d8c8;"/></div><div style="margin-bottom:12px;"><div class="field-label">Par Level (optional)</div><input type="text" inputmode="decimal" id="niPar" placeholder="e.g. 2" class="full-input" style="border:1px solid #e0d8c8;"/></div><button onclick="addItem()" style="width:100%;padding:12px;border-radius:8px;background:#1a1410;color:#c9a84c;border:none;font-weight:bold;font-size:14px;font-family:Georgia,serif;cursor:pointer;">➕ Add Item</button><div id="addMsg" style="margin-top:8px;font-size:12px;text-align:center;font-weight:bold;"></div></div>`;if(Object.keys(epChanges).length)h+=`<button class="save-btn" onclick="savePar()">💾 Save Par Changes (${Object.keys(epChanges).length} edited)</button>`;Object.entries(c).forEach(([k,items])=>{h+=`<div class="card" style="margin-bottom:10px;"><div style="font-weight:bold;font-size:13px;margin-bottom:10px;">${ICONS[k]||''} ${k}</div>`;items.forEach(item=>{const isC=S.customItems[k]&&S.customItems[k].includes(item);const pv=gp(item);const changed=epChanges[item]!==undefined;const ei=esc(item);h+=`<div class="par-row"><div style="flex:1;font-size:13px;">${item}${isC?'<span class="custom-tag">custom</span>':''}</div><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:11px;color:#8a7a5a;">Par:</span><input type="text" inputmode="decimal" value="${pv}" placeholder="—" class="par-input" style="border:1.5px solid ${changed?'#c9a84c':'#e0d8c8'};background:${changed?'#fffbe6':'#f9f6f0'};" onchange="ep('${ei}',this.value)"/></div></div>`;});h+='</div>';});if(Object.keys(epChanges).length)h+=`<button class="save-btn" onclick="savePar()" style="margin-bottom:24px;">💾 Save Par Changes</button>`;el.innerHTML=h;}
function ep(item,v){epChanges[item]=v;renderPar();}
function savePar(){Object.assign(S.par,epChanges);epChanges={};persist();renderPar();renderItems();}
function addItem(){const name=document.getElementById('niName').value.trim();const k=document.getElementById('niCat').value;const pv=document.getElementById('niPar').value.trim();const msg=document.getElementById('addMsg');if(!name){msg.textContent='Please enter a name.';msg.style.color='#9b2226';return;}if(Object.values(cats()).flat().map(i=>i.toLowerCase()).includes(name.toLowerCase())){msg.textContent='Already exists.';msg.style.color='#9b2226';return;}if(!S.customItems[k])S.customItems[k]=[];S.customItems[k].push(name);if(pv)S.par[name]=pv;persist();msg.textContent='✓ "'+name+'" added.';msg.style.color='#2d6a4f';document.getElementById('niName').value='';document.getElementById('niPar').value='';setTimeout(()=>{msg.textContent='';},3000);renderPar();renderTabs();renderItems();}

function renderSched(){const el=document.getElementById('mgrSchedule');const schedule=ORDER_SCHEDULE[loc]||[];let h=`<div style="font-size:10px;letter-spacing:2px;color:#8a7a5a;text-transform:uppercase;margin-bottom:12px;">📍 ${loc} · Ordering Schedule</div>`;schedule.forEach(s=>{h+=`<div class="schedule-card" style="background:${s.bg};border:1px solid ${s.color};"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;"><span style="font-size:28px;">${s.icon}</span><div><div style="font-weight:bold;font-size:15px;color:${s.color};">${s.label}</div><div style="font-size:12px;color:${s.color};">Applies to: ${s.cats.join(', ')}</div></div></div><div class="schedule-inner"><div style="font-size:13px;">📅 <strong>Order days:</strong> ${s.days}</div><div style="font-size:13px;margin-top:4px;">⏰ <strong>Cut-off:</strong> ${s.cutoff}</div></div></div>`;});h+=`<div style="background:#fff;border-radius:12px;padding:14px;border:1px solid #e0d8c8;font-size:12px;color:#8a7a5a;line-height:1.7;"><strong style="color:#1a1410;">Reminder:</strong> Cut-offs are strict. Flag low stock before the cut-off — don't wait until it runs out.</div>`;el.innerHTML=h;}

async function renderHistory(){const el=document.getElementById('mgrHistory');el.innerHTML=`<div style="font-size:10px;letter-spacing:2px;color:#8a7a5a;text-transform:uppercase;margin-bottom:12px;">📍 ${loc} · 7-Day Archive</div><div style="color:#8a7a5a;font-size:14px;">Loading…</div>`;const history=await loadHistory();if(!history.length){el.innerHTML=`<div style="font-size:10px;letter-spacing:2px;color:#8a7a5a;text-transform:uppercase;margin-bottom:12px;">📍 ${loc} · 7-Day Archive</div><div class="card" style="text-align:center;color:#8a7a5a;font-size:13px;font-style:italic;">No history yet. Saves automatically on daily reset.</div>`;return;}let h=`<div style="font-size:10px;letter-spacing:2px;color:#8a7a5a;text-transform:uppercase;margin-bottom:12px;">📍 ${loc} · 7-Day Archive</div><button class="save-btn" onclick="downloadHistoryCSV()">📥 Download Full History CSV</button>`;history.forEach(entry=>{const d=new Date(entry.saved_at);const dateStr=d.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});const timeStr=d.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});const items=Array.isArray(entry.items)?entry.items:[];h+=`<div class="history-card"><div class="history-date">📋 ${dateStr}</div><div class="history-meta">⏰ ${timeStr} · By: ${entry.staff_name||'Unknown'} · ${items.length} item${items.length!==1?'s':''}</div>`;if(items.length){items.forEach(i=>{const si=STATUS.find(s=>s.v===i.status);h+=`<div class="history-item-row"><span>${i.item} <span style="font-size:10px;color:#8a7a5a;">${i.category}</span></span><div style="display:flex;gap:4px;align-items:center;">${i.backups?`<span style="font-size:10px;color:#8a7a5a;">Bkp:${i.backups}</span>`:''}<span style="padding:2px 8px;border-radius:10px;font-size:10px;font-weight:bold;background:${si?si.bg:'#eee'};color:${si?si.c:'#666'}">${i.status.toUpperCase()}${i.qty?' · '+i.qty:''}</span></div></div>`;});}else h+=`<div style="font-size:12px;color:#8a7a5a;font-style:italic;">All stock was OK</div>`;h+='</div>';});el.innerHTML=h;}
function downloadHistoryCSV(){const history=loadHistory();const rows=[['Date','Time','Staff','Location','Item','Category','Status','Qty','Backups','Notes']];history.forEach(entry=>{const d=new Date(entry.saved_at);const items=Array.isArray(entry.items)?entry.items:[];if(items.length)items.forEach(i=>rows.push([d.toLocaleDateString('en-AU'),d.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'}),entry.staff_name||'',loc,i.item,i.category,i.status.toUpperCase(),i.qty||'',i.backups||'',i.notes||'']));else rows.push([d.toLocaleDateString('en-AU'),d.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'}),entry.staff_name||'',loc,'(All OK)','','','','','']);});exportCSV(rows,'delisia-history-'+loc.replace(' ','-').toLowerCase()+'-'+new Date().toISOString().slice(0,10)+'.csv');}

function renderRoles(){
  const el=document.getElementById('mgrRoles');const roles=S.customRoles||[];
  const allStaff=[...new Set([...(DEFAULT_STAFF[loc]||[]),...(S.customStaff||[])])];
  let h=`<div class="warn-box">🔐 <strong>Manager only.</strong> Manage staff names and supervisor PINs for ${loc}.</div>`;
  h+=`<div class="card" style="margin-bottom:14px;"><div style="font-weight:bold;font-size:13px;margin-bottom:12px;">👤 Staff Names — ${loc}</div>`;
  allStaff.forEach(name=>{const isDefault=(DEFAULT_STAFF[loc]||[]).includes(name);h+=`<div class="par-row"><span style="font-size:13px;">${name}${isDefault?'<span class="custom-tag">default</span>':''}</span>${!isDefault?`<button onclick="removeStaff('${esc(name)}')" style="padding:4px 10px;border-radius:8px;border:1px solid #e0d8c8;background:#fff;font-size:12px;color:#9b2226;font-family:Georgia,serif;cursor:pointer;">Remove</button>`:'<span style="font-size:11px;color:#c0b090;">built-in</span>'}</div>`;});
  h+=`<div style="display:flex;gap:8px;margin-top:12px;"><input type="text" id="newStaffName" placeholder="Add staff name..." class="full-input" style="border:1px solid #e0d8c8;"/><button onclick="addStaff()" style="padding:10px 14px;border-radius:8px;background:#1a1410;color:#c9a84c;border:none;font-weight:bold;font-family:Georgia,serif;cursor:pointer;white-space:nowrap;">➕ Add</button></div><div id="staffMsg" style="margin-top:6px;font-size:12px;font-weight:bold;"></div></div>`;
  h+=`<div class="card dashed" style="margin-bottom:14px;"><div style="font-weight:bold;font-size:13px;margin-bottom:12px;">➕ Add Supervisor Role</div><div class="field"><div class="field-label">Name</div><input type="text" id="roleName" placeholder="e.g. Head Chef" class="full-input" style="border:1px solid #e0d8c8;"/></div><div class="field"><div class="field-label">PIN (4–6 digits)</div><input type="text" inputmode="numeric" id="rolePin" placeholder="e.g. 5678" class="full-input" style="border:1px solid #e0d8c8;" maxlength="6"/></div><button onclick="addRole()" style="width:100%;padding:12px;border-radius:8px;background:#1a1410;color:#c9a84c;border:none;font-weight:bold;font-size:14px;font-family:Georgia,serif;cursor:pointer;margin-top:4px;">➕ Add Role</button><div id="roleMsg" style="margin-top:8px;font-size:12px;text-align:center;font-weight:bold;"></div></div>`;
  h+=`<div class="card"><div style="font-weight:bold;font-size:13px;margin-bottom:10px;">Access Roles</div><div class="row"><span style="font-size:13px;font-weight:bold;">BOH Supervisor</span><span style="font-size:12px;color:#8a7a5a;">PIN: 9999 · Overview only</span></div><div class="row"><span style="font-size:13px;font-weight:bold;">Manager</span><span style="font-size:12px;color:#8a7a5a;">PIN: 1234 · Full access</span></div>`;
  if(!roles.length)h+=`<div style="font-size:12px;color:#8a7a5a;font-style:italic;padding:8px 0;">No custom roles yet.</div>`;
  else roles.forEach((r,i)=>{h+=`<div class="row"><div><div style="font-size:13px;font-weight:bold;">${r.name}</div><div style="font-size:11px;color:#8a7a5a;">PIN: ${r.pin} · Overview only</div></div><button onclick="removeRole(${i})" style="padding:4px 10px;border-radius:8px;border:1px solid #e0d8c8;background:#fff;font-size:12px;color:#9b2226;font-family:Georgia,serif;cursor:pointer;">Remove</button></div>`;});
  h+='</div>';el.innerHTML=h;
}
function addStaff(){const inp=document.getElementById('newStaffName');const name=inp.value.trim();const msg=document.getElementById('staffMsg');if(!name){msg.textContent='Enter a name.';msg.style.color='#9b2226';return;}if(getStaffList().map(n=>n.toLowerCase()).includes(name.toLowerCase())){msg.textContent='Already exists.';msg.style.color='#9b2226';return;}if(!S.customStaff)S.customStaff=[];S.customStaff.push(name);saveToLocal();msg.textContent='✓ '+name+' added.';msg.style.color='#2d6a4f';inp.value='';setTimeout(()=>{msg.textContent='';},3000);renderRoles();}
function removeStaff(name){if(confirm('Remove '+name+'?')){S.customStaff=(S.customStaff||[]).filter(n=>n!==name);saveToLocal();renderRoles();}}
function addRole(){const name=document.getElementById('roleName').value.trim();const pin=document.getElementById('rolePin').value.trim();const msg=document.getElementById('roleMsg');if(!name){msg.textContent='Enter a name.';msg.style.color='#9b2226';return;}if(!pin||pin.length<4){msg.textContent='PIN must be 4+ digits.';msg.style.color='#9b2226';return;}if(pin===PIN_MANAGER||pin===PIN_BOH){msg.textContent='PIN already in use.';msg.style.color='#9b2226';return;}if(!S.customRoles)S.customRoles=[];if(S.customRoles.find(r=>r.pin===pin)){msg.textContent='PIN already exists.';msg.style.color='#9b2226';return;}S.customRoles.push({name,pin,access:'boh'});persist();msg.textContent='✓ '+name+' added.';msg.style.color='#2d6a4f';document.getElementById('roleName').value='';document.getElementById('rolePin').value='';setTimeout(()=>{msg.textContent='';},3000);renderRoles();}
function removeRole(i){if(confirm('Remove this role?')){S.customRoles.splice(i,1);persist();renderRoles();}}

document.getElementById('todayDate').textContent=new Date().toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});
document.getElementById('pinInput').addEventListener('keydown',e=>{if(e.key==='Enter')submitPin();});
document.getElementById('searchInput').addEventListener('input',e=>handleSearch(e.target.value));
document.getElementById('catChecker').addEventListener('change',e=>setCatChecker(e.target.value));
function handleSearch(v){search=v;const ct=document.getElementById('catTabs'),ra=document.getElementById('reminderArea');if(v){ct.classList.add('hidden');ra.classList.add('hidden');}else{ct.classList.remove('hidden');ra.classList.remove('hidden');}renderItems();}
function setCatChecker(name){catCheckers[cat]=name;renderActiveStaff();renderTabs();renderFooter();}
loadFromSupabase();
setInterval(()=>loadFromSupabase(),30000);
</script>
