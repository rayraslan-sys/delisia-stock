<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Délisia Stock Check</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f0eb; color: #2c2c2c; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #2c2c2c 0%, #4a3728 100%); color: white; padding: 16px 20px 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
  .header-sub { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
  .header-date { font-size: 12px; opacity: 0.8; }
  .sync-status { font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: 600; }
  .sync-ok { background: #27ae60; color: white; }
  .sync-err { background: #e74c3c; color: white; }
  .sync-loading { background: #f39c12; color: white; }
  .day-banner { background: #e8f5e9; border-left: 4px solid #27ae60; padding: 10px 16px; font-size: 13px; color: #2e7d32; font-weight: 600; }
  .tabs { display: flex; overflow-x: auto; background: #fff; border-bottom: 2px solid #e0d6cc; scrollbar-width: none; position: sticky; top: 72px; z-index: 90; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { flex-shrink: 0; padding: 12px 16px; font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; color: #888; white-space: nowrap; transition: all 0.2s; }
  .tab.active { color: #4a3728; border-bottom-color: #4a3728; }
  .section { padding: 12px 16px; }
  .section-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #999; margin-bottom: 8px; }
  .item { background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); transition: all 0.2s; }
  .item-info { flex: 1; }
  .item-name { font-size: 15px; font-weight: 600; }
  .item-detail { font-size: 12px; color: #999; margin-top: 2px; }
  .item-order-flag { font-size: 11px; color: #e67e22; font-weight: 600; margin-top: 2px; }
  .status-btn { width: 40px; height: 40px; border-radius: 50%; border: none; font-size: 18px; cursor: pointer; margin-left: 8px; display: flex; align-items: center; justify-content: center; transition: transform 0.15s; }
  .status-btn:active { transform: scale(0.9); }
  .btn-ok { background: #e8f5e9; } .btn-low { background: #fff8e1; } .btn-out { background: #ffebee; } .btn-na { background: #f3f3f3; }
  .item.status-ok { border-left: 4px solid #27ae60; } .item.status-low { border-left: 4px solid #f39c12; } .item.status-out { border-left: 4px solid #e74c3c; }
  .legend { display: flex; gap: 12px; padding: 10px 16px; background: white; border-bottom: 1px solid #eee; font-size: 12px; flex-wrap: wrap; }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .manager-section { padding: 16px; }
  .manager-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 10px; transition: opacity 0.2s; }
  .manager-btn:active { opacity: 0.8; } .btn-reset { background: #e74c3c; color: white; } .btn-export { background: #2980b9; color: white; }
  .pin-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .pin-box { background: white; border-radius: 20px; padding: 32px 24px; width: 300px; text-align: center; }
  .pin-box h2 { margin-bottom: 8px; } .pin-box p { font-size: 13px; color: #888; margin-bottom: 20px; }
  .pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
  .pin-dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #4a3728; background: transparent; transition: background 0.2s; }
  .pin-dot.filled { background: #4a3728; }
  .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .pin-key { padding: 16px; border-radius: 12px; border: 1px solid #ddd; font-size: 20px; font-weight: 600; cursor: pointer; background: #f9f9f9; }
  .pin-key:active { background: #e0d6cc; } .pin-error { color: #e74c3c; font-size: 13px; margin-top: 8px; }
  .summary-box { background: white; border-radius: 12px; padding: 16px; margin: 12px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .summary-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
  .summary-row:last-child { border-bottom: none; }
  .tag-ok { color: #27ae60; font-weight: 700; } .tag-low { color: #f39c12; font-weight: 700; } .tag-out { color: #e74c3c; font-weight: 700; }
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #2c2c2c; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .last-updated { font-size: 11px; color: #bbb; text-align: center; padding: 8px; }
  .order-reminder { background: #fff3e0; border-left: 4px solid #e67e22; padding: 10px 16px; margin: 8px 16px; border-radius: 0 8px 8px 0; font-size: 13px; color: #bf360c; }
  .order-reminder strong { display: block; margin-bottom: 4px; }
</style>
</head>
<body>
<div class="header">
  <h1>☕ Délisia Stock Check</h1>
  <div class="header-sub">
    <span class="header-date" id="headerDate"></span>
    <span class="sync-status sync-loading" id="syncStatus">Connecting…</span>
  </div>
</div>
<div class="day-banner" id="dayBanner"></div>
<div class="legend"><span>✅ OK</span><span>⚠️ Low</span><span>❌ Out</span><span>➖ N/A</span></div>
<div class="tabs" id="tabs"></div>
<div id="content"></div>
<div class="last-updated" id="lastUpdated"></div>
<div class="toast" id="toast"></div>
<div class="pin-overlay" id="pinOverlay" style="display:none">
  <div class="pin-box">
    <h2>🔐 Manager Access</h2>
    <p>Enter your 4-digit PIN</p>
    <div class="pin-dots"><div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div><div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div></div>
    <div class="pin-grid" id="pinGrid"></div>
    <div class="pin-error" id="pinError"></div>
  </div>
</div>
<script>
const SUPABASE_URL='https://upvfsexbzgquzghkwfjx.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVwdmZzZXhiemdxdXpnaGt3Zmp4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3OTI4MDUsImV4cCI6MjA5NDM2ODgwNX0.4ADYzigwSxU9zcxt27Cikqj1pHGL1c6-ld42mVFpBHg';
const MANAGER_PIN='1234';
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const now=new Date();
const todayName=DAYS[now.getDay()];
const ORDER_DAYS={'Dairy & Eggs':{days:['Tuesday','Thursday'],cutoff:'8:00am'},'Coffee & Drinks':{days:['Monday','Wednesday','Friday'],cutoff:'9:00am'},'Bread & Pastry':{days:['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],cutoff:'7:00am'}};
const CATEGORIES={
'Dairy & Eggs':[{id:'milk_full',name:'Full Cream Milk',detail:'10L per day avg'},{id:'milk_skim',name:'Skim Milk',detail:'4L per day avg'},{id:'milk_oat',name:'Oat Milk',detail:'6L per day avg'},{id:'milk_soy',name:'Soy Milk',detail:'2L per day avg'},{id:'milk_almond',name:'Almond Milk',detail:'2L per day avg'},{id:'cream',name:'Thickened Cream',detail:'For sauces & cakes'},{id:'butter',name:'Butter',detail:'Unsalted'},{id:'eggs',name:'Eggs',detail:'Free range, 1 tray = 30'},{id:'cheese_brie',name:'Brie',detail:'Board & sandwiches'},{id:'cheese_cheddar',name:'Cheddar',detail:'Sandwiches & toasties'},{id:'cheese_feta',name:'Feta',detail:'Salads & wraps'},{id:'yoghurt',name:'Greek Yoghurt',detail:'Granola bowls'}],
'Coffee & Drinks':[{id:'coffee_house',name:'House Blend Beans',detail:'3kg per day avg'},{id:'coffee_single',name:'Single Origin Beans',detail:'Pour over & batch'},{id:'decaf',name:'Decaf Beans',detail:'Check weekly'},{id:'cold_brew',name:'Cold Brew Concentrate',detail:'2L bottles'},{id:'chai',name:'Chai Concentrate',detail:'Bottle stock'},{id:'matcha',name:'Matcha Powder',detail:'Ceremonial grade'},{id:'juice_orange',name:'Orange Juice',detail:'Fresh pressed, 2L'},{id:'juice_apple',name:'Apple Juice',detail:'Bottles'},{id:'sparkling',name:'Sparkling Water',detail:'330ml cans'},{id:'syrup_vanilla',name:'Vanilla Syrup',detail:'Monin 1L'},{id:'syrup_caramel',name:'Caramel Syrup',detail:'Monin 1L'},{id:'syrup_hazel',name:'Hazelnut Syrup',detail:'Monin 1L'}],
'Bread & Pastry':[{id:'sourdough',name:'Sourdough Loaf',detail:'Sliced for toast & sandwiches'},{id:'croissant',name:'Croissants',detail:'Butter croissants'},{id:'croissant_choc',name:'Chocolate Croissant',detail:'Pain au chocolat'},{id:'muffin',name:'Muffins',detail:'Assorted daily'},{id:'scroll',name:'Scrolls',detail:'Cheese & vegemite / cinnamon'},{id:'banana_bread',name:'Banana Bread',detail:'Sliced, per loaf'},{id:'danish',name:'Danish Pastries',detail:'Seasonal assortment'},{id:'bagel',name:'Bagels',detail:'Plain & sesame'},{id:'gluten_free',name:'Gluten Free Bread',detail:'Sliced, clearly labelled'},{id:'wraps',name:'Wraps / Tortillas',detail:'Lunch wraps'}],
'Fridge & Savoury':[{id:'ham',name:'Shaved Ham',detail:'Sandwiches & toasties'},{id:'turkey',name:'Turkey / Chicken',detail:'Cold sandwiches'},{id:'smoked_salmon',name:'Smoked Salmon',detail:'Bagels & boards'},{id:'avocado',name:'Avocados',detail:'Toast & wraps'},{id:'tomato',name:'Tomatoes',detail:'Cherry & roma'},{id:'spinach',name:'Baby Spinach',detail:'Salads, sides'},{id:'cucumber',name:'Cucumbers',detail:'Sandwiches'},{id:'pesto',name:'Pesto',detail:'Jars'},{id:'hummus',name:'Hummus',detail:'Tubs'},{id:'mayo',name:'Mayonnaise',detail:'Whole egg'},{id:'mustard',name:'Dijon Mustard',detail:'Jars'}],
'Dry & Pantry':[{id:'sugar_white',name:'White Sugar',detail:'Sachets & bulk'},{id:'sugar_raw',name:'Raw Sugar',detail:'Sachets & bulk'},{id:'honey',name:'Honey',detail:'Squeeze bottles'},{id:'granola',name:'Granola',detail:'Bulk jar'},{id:'choc_sauce',name:'Chocolate Sauce',detail:'Topping & mocha'},{id:'cocoa',name:'Cocoa Powder',detail:'Dusting & drinks'},{id:'salt',name:'Salt',detail:'Kitchen & table'},{id:'pepper',name:'Pepper',detail:'Grinders & bulk'},{id:'olive_oil',name:'Olive Oil',detail:'Cooking & drizzle'},{id:'napkins',name:'Napkins',detail:'Bar & table stock'},{id:'takeaway_cups',name:'Takeaway Cups',detail:'8oz, 12oz, 16oz'},{id:'cup_lids',name:'Cup Lids',detail:'Match to cup sizes'},{id:'coffee_bags',name:'Coffee Bags / Retail',detail:'Retail shelf stock'}],
'Cleaning':[{id:'dish_soap',name:'Dish Soap',detail:'Commercial grade'},{id:'sanitiser',name:'Food-Safe Sanitiser',detail:'Spray bottles'},{id:'degreaser',name:'Degreaser',detail:'Kitchen surfaces'},{id:'bin_liners',name:'Bin Liners',detail:'Various sizes'},{id:'paper_towel',name:'Paper Towel',detail:'Kitchen rolls'},{id:'gloves',name:'Gloves',detail:'Food safe, size M & L'},{id:'cloths',name:'Cleaning Cloths',detail:'Colour coded'},{id:'mop_heads',name:'Mop Heads',detail:'Replace weekly'},{id:'hand_soap',name:'Hand Soap',detail:'All basins stocked'},{id:'dishwasher_tabs',name:'Dishwasher Tablets',detail:'Commercial machine'}],
'Manager':[]};
let state={},activeTab='Dairy & Eggs',pinInput='',managerUnlocked=false;
async function sbFetch(path,opts={}){const res=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{...opts,headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})}});if(!res.ok){const err=await res.text();throw new Error(err);}const text=await res.text();return text?JSON.parse(text):null;}
async function loadState(){setSyncStatus('loading');try{const rows=await sbFetch('stock_status?select=item_id,status,updated_at&order=item_id');state={};if(rows){rows.forEach(r=>{state[r.item_id]={status:r.status,updated_at:r.updated_at};});}setSyncStatus('ok');updateLastUpdated();return true;}catch(e){setSyncStatus('err');return false;}}
async function saveItem(itemId,status){setSyncStatus('loading');try{await sbFetch('stock_status',{method:'POST',headers:{'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify({item_id:itemId,status,updated_at:new Date().toISOString()})});state[itemId]={status,updated_at:new Date().toISOString()};setSyncStatus('ok');updateLastUpdated();}catch(e){setSyncStatus('err');showToast('⚠️ Sync failed — check connection');}}
async function resetAll(){setSyncStatus('loading');try{await sbFetch('stock_status',{method:'DELETE',headers:{'Prefer':''}});state={};setSyncStatus('ok');showToast('✅ All stock reset for new day');renderContent();updateLastUpdated();}catch(e){setSyncStatus('err');showToast('⚠️ Reset failed');}}
function setSyncStatus(s){const el=document.getElementById('syncStatus');if(s==='ok'){el.textContent='🟢 Live';el.className='sync-status sync-ok';}else if(s==='err'){el.textContent='🔴 Offline';el.className='sync-status sync-err';}else{el.textContent='🟡 Syncing…';el.className='sync-status sync-loading';}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function updateLastUpdated(){const times=Object.values(state).map(v=>v.updated_at).filter(Boolean).sort();const last=times[times.length-1];if(last){const d=new Date(last);document.getElementById('lastUpdated').textContent=`Last updated: ${d.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'})}`;}}
function setHeaderDate(){document.getElementById('headerDate').textContent=now.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});}
function setDayBanner(){const banner=document.getElementById('dayBanner');const msgs=[];Object.entries(ORDER_DAYS).forEach(([cat,info])=>{if(info.days.includes(todayName)){msgs.push(`📦 ${cat} order day — cut-off ${info.cutoff}`);}});if(msgs.length){banner.textContent=msgs.join('  •  ');banner.style.display='block';}else{banner.style.display='none';}}
function renderTabs(){const tabsEl=document.getElementById('tabs');tabsEl.innerHTML='';Object.keys(CATEGORIES).forEach(cat=>{const t=document.createElement('div');t.className='tab'+(cat===activeTab?' active':'');t.textContent=cat==='Manager'?'⚙️ Manager':cat;t.onclick=()=>{activeTab=cat;renderTabs();renderContent();};tabsEl.appendChild(t);});}
function renderContent(){const el=document.getElementById('content');if(activeTab==='Manager'){renderManager(el);return;}const items=CATEGORIES[activeTab];const orderInfo=ORDER_DAYS[activeTab];let html='';if(orderInfo&&orderInfo.days.includes(todayName)){html+=`<div class="order-reminder"><strong>📦 Order day for ${activeTab}</strong>Cut-off: ${orderInfo.cutoff} — make sure levels are checked before then!</div>`;}html+=`<div class="section"><div class="section-title">${activeTab}</div>`;items.forEach(item=>{const s=state[item.id]?.status||'';const cls=s?`item status-${s}`:'item';const orderFlag=s==='low'||s==='out'?`<div class="item-order-flag">⚠️ Add to order list</div>`:'';html+=`<div class="${cls}" id="row-${item.id}"><div class="item-info"><div class="item-name">${item.name}</div><div class="item-detail">${item.detail}</div>${orderFlag}</div><button class="status-btn ${s==='ok'?'btn-ok':'btn-na'}" onclick="setStatus('${item.id}','ok')">✅</button><button class="status-btn ${s==='low'?'btn-low':'btn-na'}" onclick="setStatus('${item.id}','low')">⚠️</button><button class="status-btn ${s==='out'?'btn-out':'btn-na'}" onclick="setStatus('${item.id}','out')">❌</button></div>`;});html+='</div>';el.innerHTML=html;}
async function setStatus(id,status){const current=state[id]?.status;const newStatus=current===status?'':status;if(newStatus){state[id]={status:newStatus,updated_at:new Date().toISOString()};}else{delete state[id];}renderContent();if(newStatus){await saveItem(id,newStatus);}else{try{await sbFetch(`stock_status?item_id=eq.${id}`,{method:'DELETE',headers:{'Prefer':''}});setSyncStatus('ok');}catch(e){setSyncStatus('err');}}}
function renderManager(el){if(!managerUnlocked){el.innerHTML='';showPin();return;}const all=Object.values(CATEGORIES).flat();const ok=all.filter(i=>state[i.id]?.status==='ok').length;const low=all.filter(i=>state[i.id]?.status==='low').length;const out=all.filter(i=>state[i.id]?.status==='out').length;const unchecked=all.length-ok-low-out;let orderItems=all.filter(i=>state[i.id]?.status==='low'||state[i.id]?.status==='out');let html=`<div class="summary-box"><div class="section-title" style="margin-bottom:12px">Today's Summary — ${todayName}</div><div class="summary-row"><span>✅ OK</span><span class="tag-ok">${ok}</span></div><div class="summary-row"><span>⚠️ Low</span><span class="tag-low">${low}</span></div><div class="summary-row"><span>❌ Out</span><span class="tag-out">${out}</span></div><div class="summary-row"><span>➖ Not checked</span><span>${unchecked}</span></div></div>`;if(orderItems.length){html+=`<div class="summary-box"><div class="section-title" style="margin-bottom:8px">🛒 Order List</div>`;orderItems.forEach(i=>{const s=state[i.id].status;html+=`<div class="summary-row"><span>${i.name}</span><span class="${s==='out'?'tag-out':'tag-low'}">${s==='out'?'OUT':'LOW'}</span></div>`;});html+='</div>';}html+=`<div class="manager-section"><button class="manager-btn btn-reset" onclick="confirmReset()">🔄 Reset All Stock (New Day)</button><button class="manager-btn btn-export" onclick="exportCSV()">📋 Export Order List</button><button class="manager-btn" style="background:#888;color:white" onclick="lockManager()">🔒 Lock Manager</button></div>`;el.innerHTML=html;}
function confirmReset(){if(confirm('Reset ALL stock statuses? This cannot be undone.\n\nUse this at the start of each new day.')){resetAll();}}
function exportCSV(){const all=Object.values(CATEGORIES).flat();const rows=[['Item','Category','Status','Detail']];Object.keys(CATEGORIES).forEach(cat=>{CATEGORIES[cat].forEach(item=>{const s=state[item.id]?.status||'unchecked';if(s==='low'||s==='out'){rows.push([item.name,cat,s.toUpperCase(),item.detail]);}});});const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`delisia-order-${now.toISOString().slice(0,10)}.csv`;a.click();}
function lockManager(){managerUnlocked=false;activeTab='Dairy & Eggs';renderTabs();renderContent();}
function showPin(){pinInput='';document.getElementById('pinOverlay').style.display='flex';document.getElementById('pinError').textContent='';updateDots();const grid=document.getElementById('pinGrid');grid.innerHTML='';[1,2,3,4,5,6,7,8,9,'',0,'⌫'].forEach(k=>{const btn=document.createElement('div');btn.className='pin-key';btn.textContent=k;if(k!=='')btn.onclick=()=>pinPress(String(k));grid.appendChild(btn);});}
function pinPress(k){if(k==='⌫'){pinInput=pinInput.slice(0,-1);}else if(pinInput.length<4){pinInput+=k;}updateDots();if(pinInput.length===4){if(pinInput===MANAGER_PIN){document.getElementById('pinOverlay').style.display='none';managerUnlocked=true;renderManager(document.getElementById('content'));}else{document.getElementById('pinError').textContent='Incorrect PIN. Try again.';pinInput='';updateDots();}}}
function updateDots(){for(let i=0;i<4;i++){document.getElementById('d'+i).classList.toggle('filled',i<pinInput.length);}}
async function init(){setHeaderDate();setDayBanner();renderTabs();renderContent();const ok=await loadState();if(ok){renderContent();setInterval(async()=>{await loadState();renderContent();},30000);}}
init();
</script>
</body>
</html>
