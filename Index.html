async function sbFetch(path,opts={}){const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,{...opts,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=representation',...(opts.headers||{})}});if(!res.ok){const e=await res.text();throw new Error(e);}const t=await res.text();return t?JSON.parse(t):null;}

async function loadFromSupabase(){setSyncDot('loading');try{const tbl='delisia_stock_'+locKey();const rows=await sbFetch(tbl+'?select=*&id=eq.1');if(rows&&rows.length){const r=rows[0];try{S.stock=JSON.parse(r.stock||'{}');}catch(e){S.stock={};}try{S.par=Object.assign({},DEFAULT_PAR,JSON.parse(r.par||'{}'));}catch(e){S.par=Object.assign({},DEFAULT_PAR);}S.name=r.staff_name||'';try{S.customItems=JSON.parse(r.custom_items||'{}');}catch(e){S.customItems={};}try{S.customRoles=JSON.parse(r.custom_roles||'[]');}catch(e){S.customRoles=[];}}setSyncDot('ok');renderAll();}catch(e){setSyncDot('err');console.error('Load error:',e.message);}}
async function saveToSupabase(){setSyncDot('loading');try{const tbl='delisia_stock_'+locKey();await sbFetch(tbl+'?id=eq.1',{method:'PATCH',body:JSON.stringify({stock:JSON.stringify(S.stock),par:JSON.stringify(S.par),staff_name:S.name,custom_items:JSON.stringify(S.customItems),custom_roles:JSON.stringify(S.customRoles||[]),updated_at:new Date().toISOString()})});setSyncDot('ok');}catch(e){setSyncDot('err');console.error('Save error:',e.message);}}
async function saveOrderToHistory(){const c=cats();const needs=Object.entries(c).flatMap(([k,items])=>items.filter(i=>gs(i)==='low'||gs(i)==='out').map(i=>({category:k,item:i,status:gs(i),qty:gq(i),notes:gn(i),backups:gb(i)})));try{const tbl='delisia_order_history_'+locKey();await sbFetch(tbl,{method:'POST',headers:{'Prefer':'return=minimal'},body:JSON.stringify({staff_name:S.name||'Unknown',location:location,items:needs,saved_at:new Date().toISOString()})});}catch(e){console.error('History save error:',e.message);}}
async function loadHistory(){try{const since=new Date(Date.now()-7*24*60*60*1000).toISOString();const tbl='delisia_order_history_'+locKey();const rows=await sbFetch(tbl+'?saved_at=gte.'+since+'&order=saved_at.desc&limit=50');return rows||[];}catch(e){console.error('History load error:',e.message);return[];}}
function persist(){clearTimeout(syncTimer);syncTimer=setTimeout(()=>saveToSupabase(),800);}
function cats(){const r={};for(const k in BASE_CATS)r[k]=[...BASE_CATS[k],...(S.customItems[k]||[])];return r;}
function allItems(){return Object.values(cats()).flat();}
function gs(i){return(S.stock[i]&&S.stock[i].status)||'';}
function gq(i){return(S.stock[i]&&S.stock[i].qty)||'';}
function gn(i){return(S.stock[i]&&S.stock[i].notes)||'';}
function gb(i){return(S.stock[i]&&S.stock[i].backups)||'';}
function gcb(i){return(S.stock[i]&&S.stock[i].checkedBy)||'';}
function gp(i){return epChanges[i]!==undefined?epChanges[i]:(S.par[i]!==undefined?S.par[i]:'');}
function done(){return allItems().filter(i=>gs(i)).length;}

function renderActiveStaff(){const bar=document.getElementById('activeStaffBar');const staffMap={};const c=cats();Object.entries(c).forEach(([k,items])=>{items.forEach(item=>{const cb=gcb(item);if(cb){if(!staffMap[cb])staffMap[cb]=new Set();staffMap[cb].add(k);}});});if(!Object.keys(staffMap).length){bar.innerHTML='<span class="active-staff-empty">No staff checked in yet</span>';return;}bar.innerHTML=Object.entries(staffMap).map(([name,catSet])=>{const c=[...catSet].slice(0,2).join(', ')+(catSet.size>2?' +more':'');return'<div class="staff-chip"><span class="staff-chip-name">'+name+'</span><span class="staff-chip-cat">'+c+'</span></div>';}).join('');}
function handleSearch(v){search=v;const ct=document.getElementById('catTabs'),ra=document.getElementById('reminderArea');if(v){ct.classList.add('hidden');ra.classList.add('hidden');}else{ct.classList.remove('hidden');ra.classList.remove('hidden');}renderItems();}
function renderTabs(){const el=document.getElementById('catTabs');el.innerHTML='';const c=cats();Object.entries(c).forEach(([k,items])=>{const checked=items.filter(i=>gs(i)).length;const unchecked=items.length-checked;const hasLow=items.some(i=>gs(i)==='low'||gs(i)==='out');const allDone=checked===items.length&&items.length>0;const b=document.createElement('button');b.className='cat-tab '+(k===cat?'active':'inactive')+(hasLow?' warn-tab':'');b.innerHTML=(ICONS[k]||'')+' '+k+(allDone?' ✓':'');if(unchecked>0&&k!==cat){b.innerHTML+='<span class="tab-badge">'+unchecked+'</span>';}b.onclick=()=>attemptCatSwitch(k);el.appendChild(b);});}
function attemptCatSwitch(newCat){if(newCat===cat)return;const c=cats();const items=c[cat]||[];const unchecked=items.filter(i=>!gs(i));if(unchecked.length>0&&S.name){pendingCatSwitch=newCat;document.getElementById('completionMsg').textContent=unchecked.length+' item'+(unchecked.length!==1?'s':'')+' in '+cat+' haven\'t been checked yet. Please make sure nothing is missed before moving on.';document.getElementById('completionModal').classList.remove('hidden');}else{doCatSwitch(newCat);}}

function renderReminder(){const el=document.getElementById('reminderArea');el.innerHTML='';const schedule=ORDER_SCHEDULE[location]||[];const rel=schedule.filter(s=>s.cats.includes(cat));if(!rel.length){el.style.paddingTop='0';return;}el.style.paddingTop='8px';rel.forEach(s=>{el.innerHTML+=`<div class="reminder"><div class="rem-card" style="background:${s.bg};border:1px solid ${s.color};"><div style="font-size:22px;">${s.icon}</div><div><div style="font-weight:bold;font-size:13px;color:${s.color};">⏰ ${s.label}</div><div style="font-size:12px;"><strong>${s.days}</strong> · Cut-off: <strong>${s.cutoff}</strong></div></div></div></div>`;});}
function renderItems(){const el=document.getElementById('itemsList');el.innerHTML='';const c=cats();let toRender={};if(search){Object.entries(c).forEach(([k,items])=>{const f=items.filter(i=>i.toLowerCase().includes(search.toLowerCase()));if(f.length)toRender[k]=f;});}else toRender={[cat]:c[cat]||[]};Object.entries(toRender).forEach(([k,items])=>{if(search){const l=document.createElement('div');l.className='cat-label';l.textContent=(ICONS[k]||'')+' '+k;el.appendChild(l);}items.forEach(item=>el.appendChild(buildCard(item,k)));});}
function buildCard(item,k){const status=gs(item),qty=gq(item),notes=gn(item),backups=gb(item),checkedBy=gcb(item);const parV=S.par[item]!==undefined?S.par[item]:(DEFAULT_PAR[item]!==undefined?DEFAULT_PAR[item]:'');const si=STATUS.find(s=>s.v===status);const bc=status==='out'?'#ffd6d6':status==='low'?'#fde8c8':'#e0d8c8';const isC=S.customItems[k]&&S.customItems[k].includes(item);const isMeat=MEAT_CATS.includes(k);const d=document.createElement('div');d.className='item-card';d.style.border='1px solid '+bc;const ei=esc(item),ek=esc(k);const parHtml=parV!==''?`<div class="item-par">📊 Par level: <strong>${parV}</strong></div>`:'';const statusBtns=STATUS.map(o=>`<button class="status-btn" style="border-color:${status===o.v?o.c:'#e0d8c8'};background:${status===o.v?o.bg:'#f9f6f0'};color:${status===o.v?o.c:'#8a7a5a'};font-weight:${status===o.v?'bold':'normal'};" onclick="setStatus('${ei}','${ek}','${o.v}')"><b>${o.l}</b><small>${o.sub}</small></button>`).join('');const backupsHtml=isMeat?`<input type="text" placeholder="Backups (cut & ready)..." value="${backups.replace(/"/g,'&quot;')}" class="item-input" onchange="setField('${ei}','backups',this.value)" style="border-color:#c9a84c;"/>`:'';const checkedHtml=checkedBy?`<div class="checked-by">✓ Checked by ${checkedBy}</div>`:'';d.innerHTML=`<div class="item-header"><div><div class="item-name">${item}${isC?'<span class="custom-tag">custom</span>':''}</div>${parHtml}</div>${si?`<div class="status-badge" style="background:${si.bg};color:${si.c};">${si.l}</div>`:''}</div><div class="status-btns">${statusBtns}</div><div class="item-inputs"><input type="text" placeholder="Qty in stock..." value="${qty.replace(/"/g,'&quot;')}" class="item-input" onchange="setField('${ei}','qty',this.value)"/><input type="text" placeholder="Notes..." value="${notes.replace(/"/g,'&quot;')}" class="item-input" onchange="setField('${ei}','notes',this.value)"/></div>${backupsHtml}${checkedHtml}`;return d;}
function setStatus(item,k,v){if(!S.stock[item])S.stock[item]={};S.stock[item].status=v;if(S.name)S.stock[item].checkedBy=S.name;persist();updateProg();renderTabs();renderItems();renderActiveStaff();}

  function renderBOH(){const el=document.getElementById('bohContent');const c=cats();const needs=Object.entries(c).flatMap(([k,items])=>items.filter(i=>gs(i)==='low'||gs(i)==='out').map(i=>({k,item:i,status:gs(i),qty:gq(i),notes:gn(i),backups:gb(i)})));let h=`<div style="font-size:10px;letter-spacing:2px;color:#8a7a5a;text-transform:uppercase;margin-bottom:12px;">📍 ${location} · Overview Summary</div>`;h+=`<div class="card"><div style="font-size:13px;font-weight:bold;margin-bottom:10px;">🛒 Items Needing Attention · ${needs.length}</div>`;if(!needs.length)h+='<div style="color:#2d6a4f;font-style:italic;font-size:13px;">All stock levels OK ✓</div>';else needs.forEach(({k,item,status,qty,notes,backups})=>{const si=STATUS.find(s=>s.v===status);h+=`<div class="row"><div><div style="font-weight:bold;font-size:13px;">${item}</div><div style="font-size:11px;color:#8a7a5a;">${k}${notes?' · '+notes:''}${backups?' · Backups: '+backups:''}</div></div><div style="padding:3px 10px;border-radius:20px;font-size:11px;font-weight:bold;background:${si?si.bg:'#eee'};color:${si?si.c:'#666'}">${status.toUpperCase()}${qty?' · '+qty:''}</div></div>`;});h+='</div>';Object.entries(c).forEach(([k,items])=>{const checked=items.filter(i=>gs(i)).length;h+=`<div class="card" style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><div style="font-weight:bold;font-size:13px;">${ICONS[k]||''} ${k}</div><div style="font-size:11px;color:#8a7a5a;">${checked}/${items.length}</div></div>`;items.forEach(item=>{const s=gs(item),q=gq(item),cb=gcb(item),bk=gb(item);const si=STATUS.find(o=>o.v===s);h+=`<div class="row"><div><span style="font-size:13px;">${item}</span>${cb?`<span style="font-size:10px;color:#8a7a5a;margin-left:6px;">· ${cb}</span>`:''}</div><div style="display:flex;gap:6px;align-items:center;">${bk?`<span style="font-size:10px;color:#8a7a5a;">Bkp:${bk}</span>`:''}${q?`<span style="font-size:11px;color:#8a7a5a;">${q}</span>`:''} justify-content:space-between;align-items:center;margin-bottom:8px;"><div style="font-weight:bold;font-size:13px;">${ICONS[k]||''} ${k}</div><div style="font-size:11px;color:#8a7a5a;">${checked}/${items.length}</div></div>`;items.forEach(item=>{const s=gs(item),q=gq(item),cb=gcb(item),bk=gb(item);const si=STATUS.find(o=>o.v===s);h+=`<div class="row"><div><span style="font-size:13px;">${item}</span>${cb?`<span style="font-size:10px;color:#8a7a5a;margin-left:4px;">· ${cb}</span>`:''}</div><div style="display:flex;gap:5px;align-items:center;">${bk?`<span style="font-size:10px;color:#8a7a5a;">Bkp:${bk}</span>`:''}${q?`<span style="font-size:11px;color:#8a7a5a;">${q}</span>`:''} ${si?`<span class="tag" style="background:${si.bg};color:${si.c};">${si.l}</span>`:'<span style="font-size:11px;color:#c0b090;">—</span>'}</div></div>`;});h+='</div>';});el.innerHTML=h;}
function toggleOrders(){showOrders=!showOrders;renderOverview();}
function downloadOrderCSV(){const c=cats();const rows=[['Date','Location','Item','Category','Status','Qty','Backups','Notes']];const dateStr=new Date().toLocaleDateString('en-AU');Object.entries(c).forEach(([k,items])=>{items.filter(i=>gs(i)==='low'||gs(i)==='out').forEach(i=>{rows.push([dateStr,location,i,k,gs(i).toUpperCase(),gq(i),gb(i),gn(i)]);});});exportCSV(rows,'delisia-order-'+location.replace(' ','-').toLowerCase()+'-'+new Date().toISOString().slice(0,10)+'.csv');}
function exportCSV(rows,filename){const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);}
async function confirmReset(){if(confirm('Reset ALL stock for a new day?\n\nToday\'s order list will be saved to history first.')){await saveOrderToHistory();S.stock={};S.name='';persist();renderAll();renderOverview();}}
function renderPar(){const c=cats(),el=document.getElementById('mgrPar');let h=`<div class="warn-box">🔐 <strong>Manager only.</strong> Set par levels and add custom items. Par levels are visible to all staff on item cards.</div><div class="card dashed" style="margin-bottom:14px;"><div style="font-weight:bold;font-size:13px;margin-bottom:12px;">➕ Add New Item</div><div class="field"><div class="field-label">Category</div><select id="niCat" class="full-input">${Object.keys(c).map(k=>`<option value="${k}">${ICONS[k]||''} ${k}</option>`).join('')}</select></div><div class="field"><div class="field-label">Item Name</div><input type="text" id="niName" placeholder="e.g. Truffle Honey" class="full-input" style="border:1px solid #e0d8c8;"/></div><div style="margin-bottom:12px;"><div class="field-label">Par Level (optional)</div><input type="text" inputmode="decimal" id="niPar" placeholder="e.g. 2" class="full-input" style="border:1px solid #e0d8c8;"/></div><button onclick="addItem()" style="width:100%;padding:12px;border-radius:8px;background:#1a1410;color:#c9a84c;border:none;font-weight:bold;font-size:14px;font-family:Georgia,serif;cursor:pointer;">➕ Add Item</button><div id="addMsg" style="margin-top:8px;font-size:12px;text-align:center;font-weight:bold;"></div></div>`;if(Object.keys(epChanges).length)h+=`<button class="save-btn" onclick="savePar()">💾 Save Par Changes (${Object.keys(epChanges).length} edited)</button>`;Object.entries(c).forEach(([k,items])=>{h+=`<div class="card" style="margin-bottom:10px;"><div style="font-weight:bold;font-size:13px;margin-bottom:10px;">${ICONS[k]||''} ${k}</div>`;items.forEach(item=>{const isC=S.customItems[k]&&S.customItems[k].includes(item);const pv=gp(item);const changed=epChanges[item]!==undefined;const ei=esc(item);h+=`<div class="par-row"><div style="flex:1;font-size:13px;">${item}${isC?'<span class="custom-tag">custom</span>':''}</div><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:11px;color:#8a7a5a;">Par:</span><input type="text" inputmode="decimal" value="${pv}" placeholder="—" class="par-input" style="border:1.5px solid ${changed?'#c9a84c':'#e0d8c8'};background:${changed?'#fffbe6':'#f9f6f0'};" onchange="ep('${ei}',this.value)"/></div></div>`;});h+='</div>';});if(Object.keys(epChanges).length)h+=`<button class="save-btn" onclick="savePar()" style="margin-bottom:24px;">💾 Save Par Changes</button>`;el.innerHTML=h;}
function ep(item,v){epChanges[item]=v;renderPar();}
function savePar(){Object.assign(S.par,epChanges);epChanges={};persist();renderPar();renderItems();}
function addItem(){const name=document.getElementById('niName').value.trim();const k=document.getElementById('niCat').value;const pv=document.getElementById('niPar').value.trim();const msg=document.getElementById('addMsg');if(!name){msg.textContent='Please enter an item name.';msg.style.color='#9b2226';return;}if(Object.values(cats()).flat().map(i=>i.toLowerCase()).includes(name.toLowerCase())){msg.textContent='That item already exists.';msg.style.color='#9b2226';return;}if(!S.customItems[k])S.customItems[k]=[];S.customItems[k].push(name);if(pv)S.par[name]=pv;persist();msg.textContent='✓ "'+name+'" added to '+k;msg.style.color='#2d6a4f';document.getElementById('niName').value='';document.getElementById('niPar').value='';setTimeout(()=>{msg.textContent='';},3000);renderPar();renderTabs();renderItems();}
function renderSched(){const el=document.getElementById('mgrSchedule');const schedule=ORDER_SCHEDULE[location]||[];let h=`<div style="font-size:10px;letter-spacing:2px;color:#8a7a5a;text-transform:uppercase;margin-bottom:12px;">📍 ${location} · Ordering Schedule</div>`;schedule.forEach(s=>{h+=`<div class="schedule-card" style="background:${s.bg};border:1px solid ${s.color};"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;"><span style="font-size:28px;">${s.icon}</span><div><div style="font-weight:bold;font-size:15px;color:${s.color};">${s.label}</div><div style="font-size:12px;color:${s.color};">Applies to: ${s.cats.join(', ')}</div></div></div><div class="schedule-inner"><div style="font-size:13px;">📅 <strong>Order days:</strong> ${s.days}</div><div style="font-size:13px;margin-top:4px;">⏰ <strong>Cut-off:</strong> ${s.cutoff}</div></div></div>`;});h+=`<div style="background:#fff;border-radius:12px;padding:14px;border:1px solid #e0d8c8;font-size:12px;color:#8a7a5a;line-height:1.7;"><strong style="color:#1a1410;">Reminder:</strong> Cut-offs are strict. Flag low stock before the cut-off — don't wait until it runs out.</div>`;el.innerHTML=h;}
async function renderHistory(){const el=document.getElementById('mgrHistory');el.innerHTML=`<div style="font-size:10px;letter-spacing:2px;color:#8a7a5a;text-transform:uppercase;margin-bottom:12px;">📍 ${location} · 7-Day Order Archive</div><div style="color:#8a7a5a;font-size:13px;">Loading history…</div>`;const history=await loadHistory();if(!history.length){el.innerHTML=`<div style="font-size:10px;letter-spacing:2px;color:#8a7a5a;text-transform:uppercase;margin-bottom:12px;">📍 ${location} · 7-Day Order Archive</div><div class="card" style="text-align:center;color:#8a7a5a;font-size:13px;font-style:italic;">No history yet.<br/>History saves automatically when you reset stock each day.</div>`;return;}let h=`<div style="font-size:10px;letter-spacing:2px;color:#8a7a5a;text-transform:uppercase;margin-bottom:12px;">📍 ${location} · 7-Day Order Archive</div><button class="save-btn" onclick="downloadHistoryCSV()">📥 Download Full History CSV</button>`;history.forEach(entry=>{const d=new Date(entry.saved_at);const dateStr=d.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long'});const timeStr=d.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});const items=Array.isArray(entry.items)?entry.items:[];h+=`<div class="history-card"><div class="history-date">📋 ${dateStr}</div><div class="history-meta">⏰ ${timeStr} · By: ${entry.staff_name||'Unknown'} · ${items.length} item${items.length!==1?'s':''}</div>`;if(items.length){items.forEach(i=>{const si=STATUS.find(s=>s.v===i.status);h+=`<div class="history-item-row"><span>${i.item} <span style="font-size:10px;color:#8a7a5a;">${i.category}</span></span><div style="display:flex;gap:4px;align-items:center;">${i.backups?`<span style="font-size:10px;color:#8a7a5a;">Bkp:${i.backups}</span>`:''}<span style="padding:2px 8px;border-radius:10px;font-size:10px;font-weight:bold;background:${si?si.bg:'#eee'};color:${si?si.c:'#666'}">${i.status.toUpperCase()}${i.qty?' · '+i.qty:''}</span></div></div>`;});}else{h+=`<div style="font-size:12px;color:#8a7a5a;font-style:italic;">All stock was OK</div>`;}h+='</div>';});el.innerHTML=h;}
async function downloadHistoryCSV(){const history=await loadHistory();const rows=[['Date','Time','Staff','Location','Item','Category','Status','Qty','Backups','Notes']];history.forEach(entry=>{const d=new Date(entry.saved_at);const dateStr=d.toLocaleDateString('en-AU');const timeStr=d.toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});const items=Array.isArray(entry.items)?entry.items:[];if(items.length){items.forEach(i=>rows.push([dateStr,timeStr,entry.staff_name||'',location,i.item,i.category,i.status.toUpperCase(),i.qty||'',i.backups||'',i.notes||'']));}else{rows.push([dateStr,timeStr,entry.staff_name||'',location,'(All OK)','','','','','']);}});exportCSV(rows,'delisia-history-'+location.replace(' ','-').toLowerCase()+'-'+new Date().toISOString().slice(0,10)+'.csv');}
function renderRoles(){const el=document.getElementById('mgrRoles');const roles=S.customRoles||[];let h=`<div class="warn-box">🔐 <strong>Manager only.</strong> Add custom BOH Supervisor access PINs. These users can view the Overview summary only.</div><div class="card dashed" style="margin-bottom:14px;"><div style="font-weight:bold;font-size:13px;margin-bottom:12px;">➕ Add Supervisor Role</div><div class="field"><div class="field-label">Name</div><input type="text" id="roleName" placeholder="e.g. Head Chef" class="full-input" style="border:1px solid #e0d8c8;"/></div><div class="field"><div class="field-label">PIN (4–6 digits)</div><input type="text" inputmode="numeric" id="rolePin" placeholder="e.g. 5678" class="full-input" style="border:1px solid #e0d8c8;" maxlength="6"/></div><button onclick="addRole()" style="width:100%;padding:12px;border-radius:8px;background:#1a1410;color:#c9a84c;border:none;font-weight:bold;font-size:14px;font-family:Georgia,serif;cursor:pointer;margin-top:4px;">➕ Add Role</button><div id="roleMsg" style="margin-top:8px;font-size:12px;text-align:center;font-weight:bold;"></div></div>`;h+=`<div class="card"><div style="font-weight:bold;font-size:13px;margin-bottom:10px;">Current Roles</div><div class="row"><span style="font-size:13px;font-weight:bold;">BOH Supervisor (default)</span><span style="font-size:12px;color:#8a7a5a;">PIN: 9999 · Overview only</span></div><div class="row"><span style="font-size:13px;font-weight:bold;">Manager (default)</span><span style="font-size:12px;color:#8a7a5a;">PIN: 1234 · Full access</span></div>`;if(!roles.length){h+=`<div style="font-size:12px;color:#8a7a5a;font-style:italic;padding:8px 0;">No custom roles added yet.</div>`;}else roles.forEach((r,i)=>{h+=`<div class="row"><div><div style="font-size:13px;font-weight:bold;">${r.name}</div><div style="font-size:11px;color:#8a7a5a;">PIN: ${r.pin} · Overview only</div></div><button onclick="removeRole(${i})" style="padding:4px 10px;border-radius:8px;border:1px solid #e0d8c8;background:#fff;font-size:12px;color:#9b2226;font-family:Georgia,serif;cursor:pointer;">Remove</button></div>`;});h+='</div>';el.innerHTML=h;}
function addRole(){const name=document.getElementById('roleName').value.trim();const pin=document.getElementById('rolePin').value.trim();const msg=document.getElementById('roleMsg');if(!name){msg.textContent='Please enter a name.';msg.style.color='#9b2226';return;}if(!pin||pin.length<4){msg.textContent='PIN must be at least 4 digits.';msg.style.color='#9b2226';return;}if(pin===PIN_MANAGER||pin===PIN_BOH){msg.textContent='That PIN is already in use.';msg.style.color='#9b2226';return;}if(!S.customRoles)S.customRoles=[];if(S.customRoles.find(r=>r.pin===pin)){msg.textContent='That PIN already exists.';msg.style.color='#9b2226';return;}S.customRoles.push({name,pin,access:'boh'});persist();msg.textContent='✓ '+name+' added.';msg.style.color='#2d6a4f';document.getElementById('roleName').value='';document.getElementById('rolePin').value='';setTimeout(()=>{msg.textContent='';},3000);renderRoles();}
function removeRole(i){if(confirm('Remove this role?')){S.customRoles.splice(i,1);persist();renderRoles();}}
</script>
</body>
